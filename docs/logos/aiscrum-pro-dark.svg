<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100" role="img" aria-labelledby="logo-title">
  <title id="logo-title">AiScrum Pro Logo (Dark Background)</title>
  <defs>
    <linearGradient id="board-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
  </defs>

  <g transform="translate(50, 50)">
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="url(#board-grad)"/>
    <rect x="-19" y="6" width="8" height="14" rx="2" fill="#C7D2FE" opacity="0.6"/>
    <rect x="-4" y="-2" width="8" height="22" rx="2" fill="#C7D2FE" opacity="0.8"/>
    <rect x="11" y="-12" width="8" height="32" rx="2" fill="#FFFFFF"/>
    <polygon points="15,-15 12,-20 18,-20" fill="#E0E7FF"/>
  </g>

  <text x="92" y="62" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" fill="#F1F5F9" letter-spacing="-1">Ai<tspan fill="#A5B4FC">Scrum</tspan><tspan dx="4" font-weight="300" fill="#C4B5FD">Pro</tspan></text>
</svg>
